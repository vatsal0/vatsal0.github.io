    "2026-04-16": "Desperation",
    "2026-04-15": "Acceptance Rates",
    "2026-04-14": "Predicting the Future",

    "2026-03-19": "It's the Same 10 Minutes",
    "2026-03-18": "Identity Gap",
    "2026-03-17": "Momentum",
  };

  const startDate = new Date("2026-03-17");
  const today = new Date();
  today.setHours(0, 0, 0, 0);

  const container = document.getElementById("daily-list");

  const todayKey = today.toISOString().slice(0, 10);

  for (let d = new Date(today); d >= startDate; d.setDate(d.getDate() - 1)) {
    const key = d.toISOString().slice(0, 10);
    const [year, month, day] = key.split("-");
    const label = `[${month}/${day}/${year}]`;

    const p = document.createElement("p");
    p.className = "entry";

    if (posts[key] && key <= todayKey) {
      p.innerHTML = `${label} <a href="daily/${key}.html">${posts[key]}</a>`;
    } else {
      p.style.color = "#aaa";
      p.innerHTML = `${label} I did not write anything today.`;
    }

    container.appendChild(p);
  }
</script>
