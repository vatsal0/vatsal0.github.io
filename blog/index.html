<script src="daily/posts.js"></script>
<script>
  const startDate = new Date("2026-03-17");
  const today = new Date();
  today.setHours(0, 0, 0, 0);

  const container = document.getElementById("daily-list");
  const todayKey = today.toISOString().slice(0, 10);

  function fmt(key) {
    const [y, m, d] = key.split("-");
    return `${m}/${d}/${y}`;
  }

  // Build list of days from today back to startDate, collapsing consecutive
  // missing days into a single range entry.
  const days = [];
  for (let d = new Date(today); d >= startDate; d.setDate(d.getDate() - 1)) {
    days.push(d.toISOString().slice(0, 10));
  }

  let i = 0;
  while (i < days.length) {
    const key = days[i];
    if (posts[key] && key <= todayKey) {
      const p = document.createElement("p");
      p.className = "entry";
      p.innerHTML = `[${fmt(key)}] <a href="daily/${key}.html">${posts[key]}</a>`;
      container.appendChild(p);
      i++;
    } else {
      // collect run of consecutive missing days
      let j = i;
      while (j < days.length && !(posts[days[j]] && days[j] <= todayKey)) {
        j++;
      }
      const runStart = days[i];    // newer date (top of run)
      const runEnd = days[j - 1];  // older date (bottom of run)
      const p = document.createElement("p");
      p.className = "entry";
      p.style.color = "#aaa";
      if (runStart === runEnd) {
        p.innerHTML = `[${fmt(runStart)}] I did not write anything today.`;
      } else {
        p.innerHTML = `[${fmt(runEnd)} – ${fmt(runStart)}] I did not write anything on these days.`;
      }
      container.appendChild(p);
      i = j;
    }
  }
</script>
